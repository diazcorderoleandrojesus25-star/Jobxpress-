<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Crear Usuario - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
    <link rel="stylesheet" href="{% static 'css/admin-modern.css' %}">
</head>
<body class="admin-modern">

<header class="navbar">
    <div class="logo">JobXpress</div>
    <nav class="nav-links">
        <a href="/admin/dashboard">Dashboard</a>
        <a href="/admin/usuarios/lista" class="active">Usuarios</a>
        <a href="/admin/roles/lista">Roles</a>
        <a href="/admin/servicios/lista">Servicios</a>
        <a href="/admin/categorias/lista">Categorias</a>
        <a href="/admin/metodos_pago/lista">Metodos de Pago</a>
        <a href="/admin/contrataciones">Contrataciones</a>
        <a href="#" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">Cerrar sesion</a>
        <form id="logout-form" action="/logout" method="POST" style="display:none;">{% csrf_token %}</form>
    </nav>
</header>

<main class="admin-shell">
    <section class="admin-hero admin-hero-grid">
        <p class="pm-eyebrow">Nuevo registro</p>
        <h1>Crear usuario</h1>
        <p>Completa la informacion basica para registrar un nuevo usuario en la plataforma.</p>
    </section>

    <section class="admin-form-card">
        <form action="/admin/usuarios/crear" method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input class="form-control" name="nombre" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Apellido</label>
                <input class="form-control" name="apellido" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input class="form-control" name="email" type="email" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Telefono</label>
                <input class="form-control" name="telefono" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Direccion</label>
                <input class="form-control" name="direccion" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="contrasena" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Rol</label>
                <select class="form-select" name="rol_id">
                    {% for r in roles %}
                    <option value="{{ r.id_rol }}">{{ r.rol }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12 admin-inline-actions">
                <button class="btn btn-success" type="submit">Guardar</button>
                <a class="btn btn-secondary" href="/admin/usuarios/lista">Cancelar</a>
            </div>
        </form>
    </section>
</main>

</body>
</html>
