<!DOCTYPE html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Restablecer contraseña</title>

    <link rel="stylesheet" href="{% static 'css/reset-password.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<div class="auth-container">
    <div class="login-logo">
        <img src="{% static 'images/logo_sidebar_blue.png' %}?v=2" alt="JobXpress Logo">
    </div>

    <h2>Crear nueva contraseña</h2>

    <p class="info-text">
        Ingresa tu nueva contraseña para recuperar el acceso a tu cuenta
    </p>

    <form method="post" action="/reset">
        {% csrf_token %}
        <input type="hidden" name="token" value="{{ token }}"/>

        <div class="form-control" style="position: relative;">
            <input id="pass1" type="password" name="password" placeholder="Nueva contraseña" required />
            <i id="eye1"
               class="bi bi-eye"
               style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;"
               onclick="togglePass('pass1','eye1')"></i>
        </div>

        <div class="form-control" style="position: relative;">
            <input id="pass2" type="password" name="confirm" placeholder="Confirmar contraseña" required />
            <i id="eye2"
               class="bi bi-eye"
               style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;"
               onclick="togglePass('pass2','eye2')"></i>
        </div>

        <button type="submit" class="btn-primary">
            Guardar contraseña
        </button>
    </form>

    <div class="back-link">
        <a href="/login">Volver al login</a>
    </div>
</div>

{% if success %}
<script>
    Swal.fire({
      icon: 'success',
      title: 'Contrasena actualizada',
      text: 'Tu contraseña ha sido cambiada correctamente',
      confirmButtonText: 'Ir al login',
      confirmButtonColor: '#0277BD'
    }).then(() => {
        window.location.href = '/login';
    });
</script>
{% endif %}

{% if error %}
<script>
    Swal.fire({
      icon: 'error',
      title: 'Error',
      text: '{{ error }}',
      confirmButtonColor: '#0277BD'
    });
</script>
{% endif %}

<script>
function togglePass(inputId, eyeId) {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);

    if (input.type === "password") {
        input.type = "text";
        eye.classList.replace("bi-eye", "bi-eye-slash");
    } else {
        input.type = "password";
        eye.classList.replace("bi-eye-slash", "bi-eye");
    }
}
</script>

</body>
</html>
